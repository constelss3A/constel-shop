<!DOCTYPE html>
<html lang="pt">
  <head>
    <title>Constel - Plataforma Administrativa</title>
    <base href="/"/>
    <meta charset="utf-8"/>
    <meta name="keywords" content="constel, plataforma administrativa, minimalista, eficiente, conectada"/>
    <meta name="author" content="Audax"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500;1,600" rel="stylesheet"/>
    <style type="text/css">
      /* body {
        -ms-overflow-style: none;
      }
      body::-webkit-scrollbar{
        display: none;
      } */
      #loading-bg {
        background: #6F42C1;
        position: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 100%;
        height: 100%;
        z-index: 999999;
        transition: 1s;
      }
      .app-logo {
        content: url("assets/images/splash/logo.svg");
        width: 100px;
        height: 100px;
      }
      .app-label {
        margin-top: 32px;
        color: white;
        font-size: 2.5em;
      }
      .app-loader {
        content: url("assets/images/splash/iniciando.svg");
        width: 80px;
        height: 80px;
        margin-top: 80px;
      }
      .app-footer {
        position: absolute;
        bottom: 0;
        width: 100%;
        background-color: rgb(48, 48, 48);
        color: white;
        text-align: center;
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <core-loading-screen id="loading-bg">
      <div>
        <img class="app-logo"/>
      </div>
      <div class="app-label">
        Constel
      </div>
      <div>
        <img class="app-loader"/>
      </div>
      <div class="app-footer">
        By Audax
      </div>
    </core-loading-screen>
    <app-root></app-root>
  </body>
</html>
